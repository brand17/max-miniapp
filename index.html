<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Выбор инструмента</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f5f5f5; padding: 16px; }
        .header { background: linear-gradient(135deg, #FFB347 0%, #FF8C00 100%); margin: -16px -16px 16px -16px; padding: 24px 16px; border-radius: 0 0 24px 24px; color: white; }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .header p { font-size: 14px; opacity: 0.9; }
        .stocks-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .stock-card { background: white; border-radius: 16px; padding: 16px; cursor: pointer; transition: transform 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; }
        .stock-card:active { transform: scale(0.98); background-color: #f9f9f9; }
        .stock-card h3 { font-size: 18px; color: #333; margin-bottom: 4px; }
        .stock-card p { font-size: 13px; color: #666; }
        .badge { display: inline-block; background: #FF8C00; color: white; font-size: 11px; padding: 4px 12px; border-radius: 20px; margin-top: 8px; font-weight: 500; }
        .status { text-align: center; padding: 16px; font-size: 14px; color: #999; margin-top: 16px; }
        .debug { background: #f0f0f0; padding: 12px; border-radius: 12px; font-size: 11px; color: #666; text-align: center; margin-top: 20px; font-family: monospace; word-break: break-all; }
        .note { background: #e3f2fd; padding: 12px; border-radius: 12px; font-size: 12px; color: #1565C0; text-align: center; margin-top: 20px; }
    </style>
    <!-- ✅ ПРАВИЛЬНОЕ ПОДКЛЮЧЕНИЕ ПО ДОКУМЕНТАЦИИ MAX -->
    <script src="https://st.max.ru/js/max-web-app.js"></script>
</head>
<body>
    <div class="header">
        <h1>📊 Инвестиционный ассистент</h1>
        <p>Выберите инструмент для входа в чат анализа</p>
    </div>
    
    <div class="stocks-list" id="stocksList">
        <div style="text-align: center; padding: 40px;">Загрузка...</div>
    </div>
    
    <div class="note">
        ⚡ Нажмите на карточку, чтобы перейти в чат обсуждения
    </div>
    
    <div class="status" id="status">Подключение...</div>
    <div class="debug" id="debug"></div>

    <script>
        // ⚠️ ВАШ РЕАЛЬНЫЙ ID ГРУППЫ (из логов бота)
        const STOCKS = [
            { 
                ticker: "BTC_TREASURY", 
                name: "🔹 Биткоин-казначейские облигации", 
                description: "Структурный продукт, доходность обгоняет BTC",
                chatId: "-75427806028410"
            },
            { 
                ticker: "SBER", 
                name: "🔹 Сбербанк", 
                description: "Акции крупнейшего банка РФ",
                chatId: "-75427806028410"
            }
        ];
        
        const debugEl = document.getElementById('debug');
        const statusEl = document.getElementById('status');
        
        function log(msg) {
            console.log(msg);
            if (debugEl) {
                debugEl.innerHTML += msg + '\n';
            }
        }
        
        // Функция перехода в чат через деплинк (самый надёжный способ)
        function openChat(chatId, chatName) {
            log(`🚀 Переход в чат "${chatName}", ID: ${chatId}`);
            statusEl.innerHTML = `⏳ Переход в чат "${chatName}"...`;
            
            // Формируем деплинк MAX
            const deeplink = `max://chat/${chatId}`;
            log(`🔗 Деплинк: ${deeplink}`);
            
            // Пытаемся открыть через window.location
            window.location.href = deeplink;
            
            // Если через 2 секунды не ушли — показываем ID для ручного перехода
            setTimeout(() => {
                statusEl.innerHTML = `⚠️ Если переход не произошёл, введите в поиске MAX: ${chatId}`;
                log(`⚠️ Ручной переход: введите ID ${chatId} в поиск MAX`);
            }, 2000);
        }
        
        function renderStocks() {
            const container = document.getElementById('stocksList');
            if (!container) return;
            
            container.innerHTML = STOCKS.map(stock => `
                <div class="stock-card" data-chatid="${stock.chatId}" data-name="${stock.name}">
                    <h3>${stock.name}</h3>
                    <p>${stock.description}</p>
                    <span class="badge">Войти в чат →</span>
                </div>
            `).join('');
            
            document.querySelectorAll('.stock-card').forEach(card => {
                card.addEventListener('click', () => {
                    const chatId = card.dataset.chatid;
                    const name = card.dataset.name;
                    openChat(chatId, name);
                });
            });
        }
        
        // Инициализация
        function init() {
            log('🔧 Инициализация...');
            
            // Проверяем, доступен ли WebApp (новое API MAX)
            if (typeof window.WebApp !== 'undefined') {
                log('✅ MAX WebApp готов');
                statusEl.innerHTML = '✅ Готово. Выберите инструмент.';
            } else {
                log('⚠️ WebApp не загружен, но переход через деплинк будет работать');
                statusEl.innerHTML = '✅ Выберите инструмент (переход через ссылку)';
            }
            
            renderStocks();
        }
        
        // Запускаем после загрузки страницы
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
