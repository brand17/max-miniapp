<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Выбор продукта</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f5f5f5; padding: 16px; }
        .header { background: linear-gradient(135deg, #FFB347 0%, #FF8C00 100%); margin: -16px -16px 16px -16px; padding: 24px 16px; border-radius: 0 0 24px 24px; color: white; }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .header p { font-size: 14px; opacity: 0.9; }
        .stocks-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .stock-card { background: white; border-radius: 16px; padding: 16px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; }
        .stock-card:active { transform: scale(0.98); background-color: #f9f9f9; }
        .stock-card h3 { font-size: 18px; color: #333; margin-bottom: 4px; }
        .stock-card p { font-size: 13px; color: #666; }
        .badge { display: inline-block; background: #FF8C00; color: white; font-size: 11px; padding: 4px 12px; border-radius: 20px; margin-top: 8px; font-weight: 500; }
        .note { background: #e3f2fd; padding: 12px; border-radius: 12px; font-size: 12px; color: #1565C0; text-align: center; margin-top: 20px; }
    </style>
    <script src="https://st.max.ru/js/max-web-app.js"></script>
</head>
<body>
    <div class="header">
        <h1>📊 Инвестиционный ассистент</h1>
        <p>Выберите продукт для консультации</p>
    </div>
    
    <div class="stocks-list" id="stocksList">
        <div style="text-align: center; padding: 40px;">Загрузка...</div>
    </div>
    
    <div class="note">
        🔄 Нажмите на карточку — откроется чат с экспертом
    </div>

    <script>
        // ⚠️ ЗАМЕНИТЕ ССЫЛКИ НА ВАШИ РЕАЛЬНЫЕ ПРИГЛАСИТЕЛЬНЫЕ ССЫЛКИ
        const PRODUCTS = [
            { 
                id: "BTC_TREASURY", 
                name: "🏦 Биткоин-казначейские облигации", 
                description: "Структурный продукт, доходность обгоняет BTC",
                inviteLink: "https://max.ru/join/QmkCfF0r5RPkmgw4UCANLs7tP-smXEl18XBQR43rnUU"  // ← ЗАМЕНИТЕ
            },
            { 
                id: "RIVER_RESIDENCES", 
                name: "🏰 River Residences", 
                description: "Премиальный жилой комплекс в Серебряном бору",
                inviteLink: "https://max.ru/join/W42asjTw6c2_6L-lsVFwQxjd0_vtWM1pAd86vYLEAtw"  // ← ЗАМЕНИТЕ
            }
        ];
        
        function openChat(inviteLink, productName) {
            console.log(`Открываю чат для: ${productName}`);
            window.location.href = inviteLink;
        }
        
        function renderProducts() {
            const container = document.getElementById('stocksList');
            if (!container) return;
            
            container.innerHTML = PRODUCTS.map(product => `
                <div class="stock-card" data-link="${product.inviteLink}" data-name="${product.name}">
                    <h3>${product.name}</h3>
                    <p>${product.description}</p>
                    <span class="badge">Перейти в чат →</span>
                </div>
            `).join('');
            
            document.querySelectorAll('.stock-card').forEach(card => {
                card.addEventListener('click', () => {
                    const inviteLink = card.dataset.link;
                    const name = card.dataset.name;
                    openChat(inviteLink, name);
                });
            });
        }
        
        renderProducts();
    </script>
</body>
</html>
