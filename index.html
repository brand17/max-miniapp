<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Инвестиционный ассистент</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            padding: 16px;
        }
        
        .header {
            background: linear-gradient(135deg, #FFB347 0%, #FF8C00 100%);
            margin: -16px -16px 16px -16px;
            padding: 24px 16px;
            border-radius: 0 0 24px 24px;
            color: white;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .stocks-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .stock-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0;
        }
        
        .stock-card:active {
            transform: scale(0.98);
        }
        
        .stock-card h3 {
            font-size: 18px;
            color: #333;
            margin-bottom: 4px;
        }
        
        .stock-card p {
            font-size: 13px;
            color: #666;
        }
        
        .badge {
            display: inline-block;
            background: #FF8C00;
            color: white;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
            margin-top: 8px;
        }
        
        .message-input {
            margin-top: 20px;
            background: white;
            border-radius: 16px;
            padding: 12px;
            border: 1px solid #e0e0e0;
        }
        
        .message-input input {
            width: 100%;
            border: none;
            padding: 12px;
            font-size: 16px;
            border-radius: 12px;
            background: #f5f5f5;
        }
        
        .message-input button {
            width: 100%;
            margin-top: 12px;
            background: #FF8C00;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
    <!-- Подключаем MAX Bridge для взаимодействия с мессенджером -->
    <script src="https://cdn.jsdelivr.net/npm/@maxhub/max-bridge@latest/dist/max-bridge.min.js"></script>
</head>
<body>
    <div class="header">
        <h1>📊 Инвестиционный ассистент</h1>
        <p>Выберите ценную бумагу для анализа</p>
    </div>
    
    <div class="stocks-list" id="stocksList">
        <!-- Список будет заполнен через JS -->
        <div style="text-align: center; padding: 40px;">Загрузка...</div>
    </div>
    
    <div class="message-input">
        <input type="text" id="questionInput" placeholder="Или задайте вопрос напрямую..." />
        <button id="sendBtn">Отправить</button>
    </div>

    <script>
        // Список ценных бумаг (синхронизирован с config.js вашего бота)
        const STOCKS = [
            { ticker: "SBER", name: "Сбербанк", description: "Акции крупнейшего банка РФ" },
            { ticker: "GAZP", name: "Газпром", description: "Энергетический гигант" },
            { ticker: "YNDX", name: "Яндекс", description: "IT-компания, поисковик, e-commerce" },
            { ticker: "BTC", name: "Биткоин-казначейские облигации", description: "Структурный продукт с привязкой к биткоину" }
        ];
        
        // Инициализация MAX Bridge
        let maxBridge = null;
        
        async function initMaxBridge() {
            if (typeof MaxBridge !== 'undefined') {
                maxBridge = new MaxBridge();
                await maxBridge.ready();
                console.log("MAX Bridge готов");
            } else {
                console.log("Работаем вне MAX (локальная разработка)");
            }
        }
        
        // Отправка сообщения в чат с ботом
        async function sendToChat(text) {
            if (maxBridge) {
                // Открываем текущий чат с предзаполненным сообщением
                // Пользователь сам нажмёт "Отправить"
                await maxBridge.openChat({
                    text: text,           // Предзаполненный текст
                    chat_id: null        // null = текущий чат с ботом
                });
                maxBridge.close();       // Закрываем мини-приложение
            } else {
                alert("Вы выбрали: " + text);
            }
        }        
        // Заполнение списка бумаг
        function renderStocks() {
            const container = document.getElementById('stocksList');
            container.innerHTML = STOCKS.map(stock => `
                <div class="stock-card" data-ticker="${stock.ticker}" data-name="${stock.name}">
                    <h3>${stock.name}</h3>
                    <p>${stock.description}</p>
                    <span class="badge">Выбрать</span>
                </div>
            `).join('');
            
            // Добавляем обработчики кликов
            document.querySelectorAll('.stock-card').forEach(card => {
                card.addEventListener('click', () => {
                    const name = card.dataset.name;
                    const ticker = card.dataset.ticker;
                    
                    // Отправляем сообщение в чат с выбором бумаги
                    sendToChat(`Выбрана бумага: ${name} (${ticker})`);
                });
            });
        }
        
        // Отправка текстового вопроса
        document.getElementById('sendBtn')?.addEventListener('click', () => {
            const input = document.getElementById('questionInput');
            const text = input.value.trim();
            if (text) {
                sendToChat(text);
                input.value = '';
            }
        });
        
        document.getElementById('questionInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const text = e.target.value.trim();
                if (text) {
                    sendToChat(text);
                    e.target.value = '';
                }
            }
        });
        
        // Запуск
        initMaxBridge().then(() => {
            renderStocks();
        });
    </script>
</body>
</html>
