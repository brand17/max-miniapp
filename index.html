<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Выбор инструмента</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f5f5f5; padding: 16px; }
        .header { background: linear-gradient(135deg, #FFB347 0%, #FF8C00 100%); margin: -16px -16px 16px -16px; padding: 24px 16px; border-radius: 0 0 24px 24px; color: white; }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .header p { font-size: 14px; opacity: 0.9; }
        .stocks-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .stock-card { background: white; border-radius: 16px; padding: 16px; cursor: pointer; transition: transform 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; }
        .stock-card:active { transform: scale(0.98); background-color: #f9f9f9; }
        .stock-card h3 { font-size: 18px; color: #333; margin-bottom: 4px; }
        .stock-card p { font-size: 13px; color: #666; }
        .badge { display: inline-block; background: #FF8C00; color: white; font-size: 11px; padding: 4px 12px; border-radius: 20px; margin-top: 8px; font-weight: 500; }
        .status { text-align: center; padding: 16px; font-size: 14px; color: #999; margin-top: 16px; }
        .debug { background: #f0f0f0; padding: 12px; border-radius: 12px; font-size: 11px; color: #666; text-align: center; margin-top: 20px; font-family: monospace; word-break: break-all; display: none; }
        .note { background: #e3f2fd; padding: 12px; border-radius: 12px; font-size: 12px; color: #1565C0; text-align: center; margin-top: 20px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .btn-copy-manual { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-size: 14px; margin-top: 10px; cursor: pointer; width: 100%; }
    </style>
    <script src="https://st.max.ru/js/max-web-app.js"></script>
</head>
<body>
    <div class="header">
        <h1>📊 Инвестиционный ассистент</h1>
        <p>Выберите инструмент для анализа</p>
    </div>
    
    <div class="stocks-list" id="stocksList">
        <div style="text-align: center; padding: 40px;">Загрузка...</div>
    </div>
    
    <div class="note">
        ⚡ Нажмите на карточку → текст скопируется → вернитесь в чат и нажмите «Вставить»
    </div>
    
    <div class="status" id="status">Выберите инструмент</div>

    <script>
        const STOCKS = [
            { 
                ticker: "BTC_TREASURY", 
                name: "🔹 Биткоин-казначейские облигации", 
                description: "Структурный продукт, доходность обгоняет BTC"
            },
            { 
                ticker: "SBER", 
                name: "🔹 Сбербанк", 
                description: "Акции крупнейшего банка РФ"
            },
            { 
                ticker: "GAZP", 
                name: "🔹 Газпром", 
                description: "Энергетический гигант"
            }
        ];
        
        const statusEl = document.getElementById('status');
        
        function log(msg) {
            console.log(msg);
        }
        
        // Функция копирования текста в буфер
        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                log('✅ Скопировано: ' + text);
                return true;
            } catch (err) {
                log('❌ Ошибка копирования: ' + err);
                // Альтернативный метод для старых браузеров
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                return true;
            }
        }
        
        // Выбор бумаги
        async function selectStock(stockName, stockTicker) {
            const messageText = `Выбрана бумага: ${stockName} (${stockTicker})`;
            log(`📤 Выбор: ${messageText}`);
            
            // Показываем статус
            statusEl.innerHTML = '📋 Копирование...';
            statusEl.className = 'status';
            
            // Копируем в буфер обмена
            await copyToClipboard(messageText);
            
            // Меняем статус на успех
            statusEl.innerHTML = '✅ Текст скопирован! Теперь:\n1. Нажмите «Готово»\n2. Вернитесь в чат с ботом\n3. Нажмите и удерживайте поле ввода → «Вставить»\n4. Отправьте сообщение';
            statusEl.classList.add('success');
            
            // Пытаемся закрыть мини-приложение через 2 секунды
            setTimeout(() => {
                if (typeof window.WebApp !== 'undefined' && window.WebApp.close) {
                    log('🔒 Закрываем мини-приложение');
                    window.WebApp.close();
                } else {
                    log('⚠️ Не удалось закрыть, закройте вручную');
                    statusEl.innerHTML += '\n\n⚠️ Закройте окно вручную (крестик в правом верхнем углу)';
                }
            }, 2500);
        }
        
        function renderStocks() {
            const container = document.getElementById('stocksList');
            if (!container) return;
            
            container.innerHTML = STOCKS.map(stock => `
                <div class="stock-card" data-name="${stock.name}" data-ticker="${stock.ticker}">
                    <h3>${stock.name}</h3>
                    <p>${stock.description}</p>
                    <span class="badge">Выбрать →</span>
                </div>
            `).join('');
            
            document.querySelectorAll('.stock-card').forEach(card => {
                card.addEventListener('click', () => {
                    const name = card.dataset.name;
                    const ticker = card.dataset.ticker;
                    selectStock(name, ticker);
                });
            });
        }
        
        // Инициализация
        function init() {
            log('🔧 Инициализация...');
            
            if (typeof window.WebApp !== 'undefined') {
                log('✅ MAX WebApp готов');
                statusEl.innerHTML = '✅ Выберите инструмент';
            } else {
                log('⚠️ WebApp не загружен');
                statusEl.innerHTML = '⚠️ Работаем в режиме копирования';
            }
            
            renderStocks();
        }
        
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
