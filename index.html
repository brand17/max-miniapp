<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Выбор инструмента</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f5f5f5; padding: 16px; }
        .header { background: linear-gradient(135deg, #FFB347 0%, #FF8C00 100%); margin: -16px -16px 16px -16px; padding: 24px 16px; border-radius: 0 0 24px 24px; color: white; }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .header p { font-size: 14px; opacity: 0.9; }
        .stocks-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .stock-card { background: white; border-radius: 16px; padding: 16px; cursor: pointer; transition: transform 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; }
        .stock-card:active { transform: scale(0.98); background-color: #f9f9f9; }
        .stock-card h3 { font-size: 18px; color: #333; margin-bottom: 4px; }
        .stock-card p { font-size: 13px; color: #666; }
        .badge { display: inline-block; background: #FF8C00; color: white; font-size: 11px; padding: 4px 12px; border-radius: 20px; margin-top: 8px; font-weight: 500; }
        .status { text-align: center; padding: 16px; font-size: 14px; margin-top: 16px; }
        .loading { background: #fff3cd; color: #856404; border-radius: 12px; }
        .success { background: #d4edda; color: #155724; border-radius: 12px; }
        .error { background: #f8d7da; color: #721c24; border-radius: 12px; }
        .note { background: #e3f2fd; padding: 12px; border-radius: 12px; font-size: 12px; color: #1565C0; text-align: center; margin-top: 20px; }
    </style>
    <script src="https://st.max.ru/js/max-web-app.js"></script>
</head>
<body>
    <div class="header">
        <h1>📊 Инвестиционный ассистент</h1>
        <p>Выберите инструмент — сразу перейдёте в чат</p>
    </div>
    
    <div class="stocks-list" id="stocksList">
        <div style="text-align: center; padding: 40px;">Загрузка...</div>
    </div>
    
    <div class="note">
        🔄 Нажмите на карточку — откроется чат с экспертом по выбранному инструменту
    </div>
    
    <div class="status" id="status">Загрузка...</div>

    <script>
        // ⚠️ ВАЖНО: ЗАМЕНИТЕ ЭТИ ID НА ВАШИ РЕАЛЬНЫЕ ID ЧАТОВ
        const STOCKS = [
            { 
                ticker: "BTC_TREASURY", 
                name: "🔹 Биткоин-казначейские облигации", 
                description: "Структурный продукт, доходность обгоняет BTC",
                chatId: "-75427806028410"  // ← ВАШ ID ИЗ ЛОГОВ
            },
            { 
                ticker: "SBER", 
                name: "🔹 Сбербанк", 
                description: "Акции крупнейшего банка РФ",
                chatId: "-75427806028410"  // ← ПОКА ИСПОЛЬЗУЕМ ТОТ ЖЕ ДЛЯ ТЕСТА
            }
        ];
        
        const statusEl = document.getElementById('status');
        
        function log(msg, type = 'info') {
            console.log(msg);
            statusEl.textContent = msg;
            statusEl.className = `status ${type}`;
        }
        
        // ГЛАВНАЯ ФУНКЦИЯ — ОТКРЫТИЕ ЧАТА
        async function openChat(chatId, chatName) {
            log(`🔄 Открываю чат "${chatName}"...`, 'loading');
            
            // Метод 1: Используем официальный MAX Bridge API
            if (typeof window.WebApp !== 'undefined') {
                try {
                    // Пытаемся открыть чат через WebApp
                    if (window.WebApp.openChat) {
                        await window.WebApp.openChat({ chat_id: chatId });
                        log(`✅ Переход в чат "${chatName}" выполнен`, 'success');
                        return;
                    }
                    
                    // Альтернативный метод: открываем через деплинк
                    const deeplink = `max://chat/${chatId}`;
                    window.location.href = deeplink;
                    log(`🔗 Переход по ссылке: ${deeplink}`, 'loading');
                    
                    // Проверяем через 2 секунды, не застряли ли
                    setTimeout(() => {
                        log(`⚠️ Если переход не произошёл, введите ID вручную: ${chatId}`, 'error');
                    }, 2000);
                    
                } catch (err) {
                    log(`❌ Ошибка: ${err.message}`, 'error');
                    // Fallback: показываем ID для ручного ввода
                    fallbackOpen(chatId);
                }
            } else {
                log('⚠️ WebApp не загружен, использую резервный метод', 'error');
                fallbackOpen(chatId);
            }
        }
        
        // Резервный метод — показываем ID и копируем в буфер
        function fallbackOpen(chatId) {
            navigator.clipboard.writeText(chatId).then(() => {
                log(`📋 ID чата скопирован: ${chatId}\nВставьте его в поиск MAX и перейдите в чат`, 'success');
            }).catch(() => {
                log(`⚠️ Скопируйте ID вручную: ${chatId} и вставьте в поиск MAX`, 'error');
            });
        }
        
        function renderStocks() {
            const container = document.getElementById('stocksList');
            if (!container) return;
            
            container.innerHTML = STOCKS.map(stock => `
                <div class="stock-card" data-chatid="${stock.chatId}" data-name="${stock.name}">
                    <h3>${stock.name}</h3>
                    <p>${stock.description}</p>
                    <span class="badge">Перейти в чат →</span>
                </div>
            `).join('');
            
            document.querySelectorAll('.stock-card').forEach(card => {
                card.addEventListener('click', () => {
                    const chatId = card.dataset.chatid;
                    const name = card.dataset.name;
                    openChat(chatId, name);
                });
            });
        }
        
        // Инициализация
        function init() {
            log('🔧 Проверка подключения к MAX...', 'loading');
            
            if (typeof window.WebApp !== 'undefined') {
                log('✅ MINI APP: Выберите инструмент для перехода в чат', 'success');
            } else {
                log('⚠️ Работа вне MAX, переход может не сработать', 'error');
            }
            
            renderStocks();
        }
        
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
